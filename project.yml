name: AIPnote
options:
  bundleIdPrefix: com.beqd1106
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"           # App Storeに表示されるバージョン
    CURRENT_PROJECT_VERSION: "1"         # ビルド番号（CIで自動上書き）
    VERSIONING_SYSTEM: apple-generic     # agvtoolでビルド番号を更新できるように
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: ja
    TARGETED_DEVICE_FAMILY: "1"          # iPhone専用

targets:
  AIPnote:
    type: application
    platform: iOS
    sources:
      - App
      - Models
      - Logic
      - DesignSystem
      - Views
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beqd1106.aipnote
        TARGETED_DEVICE_FAMILY: "1"        # iPhone専用（iPad向き要件を回避）
        GENERATE_INFOPLIST_FILE: NO        # 手書きInfo.plistで向き要件を確実にクリア
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: AIPnote
        CFBundleName: AIPnote
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true             # マルチタスク非対応＝全方向要件を回避（90474対策）
        UIRequiredDeviceCapabilities:
          - arm64
        ITSAppUsesNonExemptEncryption: false   # 標準的なHTTPSのみ→輸出コンプライアンスを自動クリア

  AIPnoteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: AIPnote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beqd1106.aipnote.tests
        GENERATE_INFOPLIST_FILE: YES
